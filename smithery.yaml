# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - evoCrawlApiKey
    properties:
      evoCrawlApiKey:
        type: string
        description: Your Evocrawl API key. Required for cloud API usage.
      evoCrawlApiUrl:
        type: string
        description:
          Custom API endpoint for self-hosted instances. If provided, API key
          becomes optional.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { EVOCRAWL_API_KEY: config.evoCrawlApiKey, EVOCRAWL_API_URL: config.evoCrawlApiUrl || '' } })
